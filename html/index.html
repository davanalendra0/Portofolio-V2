<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dava Nalendra - Portofolio</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <header class="header">
        <div class="header-left">
            <a href="#top" class="logo">
                <img src="../asset/img/logo.png" alt="Dava Logo">
            </a>
        </div>

        <nav class="nav header-center" id="navMenu">
            <a href="#about" data-text="about"><span>about</span></a>
            <a href="#skills" data-text="skills"><span>skills</span></a>
            <a href="#projects" data-text="projects"><span>projects</span></a>
            <a href="#experience" data-text="experience"><span>experience</span></a>
        </nav>

        <div class="header-right">
            <div class="lang">
                <button class="lang-btn" id="langBtn">
                    🌐<span id="currentLang">EN</span>
                    <span class="arrow">▾</span>
                </button>

                <div class="lang-dropdown" id="langDropdown">
                    <div class="lang-item active" data-lang="en">
                        <span>US</span>
                        <strong>English</strong>
                        <span>EN</span>
                    </div>

                    <div class="lang-item" data-lang="id">
                        <span>ID</span>
                        <strong>Indonesia</strong>
                        <span>ID</span>
                    </div>
                </div>
            </div>
            
            <a href="#video" class="my-video-btn ripple-btn">
                <span class="label">My Video</span>
                <span class="ripple"></span>
            </a>
        </div>

        <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#experience">Experience</a>
        <a href="#video" class="video-link">My Video</a>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
